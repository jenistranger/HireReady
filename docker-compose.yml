services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hireready
      POSTGRES_USER: hireready
      POSTGRES_PASSWORD: hireready
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireready -d hireready"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "47821:47821"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://hireready:hireready@postgres:5432/hireready
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
